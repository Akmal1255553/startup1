services:
  - type: web
    name: returnguard-ai
    runtime: node
    plan: free
    buildCommand: npm ci && npm run setup:prod && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SCOPES
        value: read_orders,read_returns,read_products,read_customers
