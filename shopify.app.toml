# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "0b558248ba23abd6861a0a76702f8325"
name = "ReturnGuard-AI"
application_url = "https://return-guard-ai-tan.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = false

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/orders/create"
  topics = [ "orders/create" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/orders/updated"
  topics = [ "orders/updated" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/refunds/create"
  topics = [ "refunds/create" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/returns/request"
  topics = [ "returns/request" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/returns/approve"
  topics = [ "returns/approve" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/returns/decline"
  topics = [ "returns/decline" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/returns/cancel"
  topics = [ "returns/cancel" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/data_request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/shop/redact"
  compliance_topics = [ "shop/redact" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_orders,read_returns,read_products,read_customers"

[auth]
redirect_urls = [
  "https://return-guard-ai-tan.vercel.app/auth/callback",
  "https://return-guard-ai-tan.vercel.app/auth/shopify/callback",
  "https://return-guard-ai-tan.vercel.app/api/auth/callback",
]
